name: Release

on:
  push:
    branches:
      - master

  workflow_dispatch:
    inputs:
      npm_tag:
        description: 'NPM dist-tag'
        required: false
        default: latest
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  test:
    if: github.event_name == 'push'
    uses: ./.github/workflows/test.yml
    secrets: inherit

  release-please:
    name: Release Please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: node

  publish-release:
    name: Publish Release to NPM
    runs-on: ubuntu-latest
    needs: release-please
    if: |
      github.event_name == 'push' &&
      needs.release-please.outputs.release_created == 'true'

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: NODE_AUTH_TOKEN="" npm publish --provenance --access public --tag latest

  publish-manual:
    name: Publish Manual to NPM
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: |
          NODE_AUTH_TOKEN="" npm publish \
            --provenance \
            --access public \
            --tag "${{ inputs.npm_tag }}"
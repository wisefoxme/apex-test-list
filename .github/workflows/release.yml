name: Release

on:
  push:
    branches:
      - master

  workflow_dispatch:
    inputs:
      github_tag:
        description: 'Existing GitHub tag to publish'
        required: true
        type: string
      npm_tag:
        description: 'NPM dist-tag'
        required: false
        default: latest
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  test:
    if: github.event_name == 'push'
    uses: ./.github/workflows/test.yml
    secrets: inherit

  release-please:
    name: Release Please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: node

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [release-please]

    if: |
      (github.event_name == 'push' &&
       needs.release-please.outputs.release_created == 'true') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout release tag (push flow)
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Checkout specified tag (manual flow)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.github_tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: |
          NODE_AUTH_TOKEN="" npm publish \
            --provenance \
            --access public \
            --tag ${{ github.event_name == 'workflow_dispatch' && inputs.npm_tag || 'latest' }}